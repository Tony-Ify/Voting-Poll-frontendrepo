<div class="admin-container">
  <h2>Admin Dashboard</h2>
  <button (click)="createPoll()" class="btn btn-primary">+ Create Poll</button>
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let poll of polls">
        <td>{{ poll.title }}</td>
        <td>{{ poll.status }}</td>
        <td>
          <button (click)="editPoll(poll.id)" class="btn btn-sm">Edit</button>
          <button (click)="deletePoll(poll.id)" class="btn btn-sm btn-danger">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
