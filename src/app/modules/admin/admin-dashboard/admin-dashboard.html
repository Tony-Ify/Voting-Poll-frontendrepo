<div class="admin-container">
  <div class="admin-header">
    <h2>Admin Dashboard</h2>
    <button class="btn btn-primary" (click)="createPoll()">
      + Create New Poll
    </button>
  </div>

  <!-- Loading -->
  <div class="loading" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading polls...</p>
  </div>

  <!-- Error -->
  <div class="alert alert-danger" *ngIf="error">
    {{ error }}
    <button class="btn btn-sm" (click)="loadPolls()">Retry</button>
  </div>

  <!-- Polls Table -->
  <div class="polls-table" *ngIf="!loading && !error">
    <div *ngIf="polls.length === 0" class="empty-state">
      <p>No polls created yet</p>
      <button class="btn btn-primary" (click)="createPoll()">
        Create Your First Poll
      </button>
    </div>

    <table *ngIf="polls.length > 0" class="table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Options</th>
          <th>Votes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let poll of polls" class="poll-row">
          <td class="title-cell">
            <strong>{{ poll.title }}</strong>
            <small>{{ poll.description | slice:0:50 }}...</small>
          </td>
          <td>
            <span class="badge" [class.active]="poll.status === 'active'">
              {{ poll.status | uppercase }}
            </span>
          </td>
          <td class="center">{{ poll.options.length }}</td>
          <td class="center">{{ poll.totalVotes || 0 }}</td>
          <td class="actions-cell">
            <button 
              class="btn btn-sm btn-secondary"
              (click)="editPoll(poll.id)"
              title="Edit poll"
            >
              Edit
            </button>
            <button 
              class="btn btn-sm btn-secondary"
              (click)="togglePollStatus(poll)"
              [title]="poll.status === 'active' ? 'Close poll' : 'Reopen poll'"
            >
              {{ poll.status === 'active' ? 'Close' : 'Reopen' }}
            </button>
            <button 
              class="btn btn-sm btn-danger"
              (click)="confirmDelete(poll.id)"
              title="Delete poll"
            >
              Delete
            </button>

            <!-- Delete Confirmation -->
            <div class="delete-confirm" *ngIf="deleteConfirm === poll.id">
              <p>Delete this poll permanently?</p>
              <div class="confirm-actions">
                <button 
                  class="btn btn-sm btn-danger"
                  (click)="deletePoll(poll.id)"
                >
                  Confirm Delete
                </button>
                <button 
                  class="btn btn-sm btn-secondary"
                  (click)="cancelDelete()"
                >
                  Cancel
                </button>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
