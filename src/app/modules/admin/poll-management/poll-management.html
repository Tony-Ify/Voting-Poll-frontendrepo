<div class="poll-management-container">
  <div class="header">
    <h2>{{ isEditMode ? 'Edit Poll' : 'Create New Poll' }}</h2>
    <button class="btn btn-secondary" (click)="goBack()">← Back</button>
  </div>

  <div class="loading" *ngIf="loading">
    <div class="spinner"></div>
    <p>{{ isEditMode ? 'Loading poll...' : 'Creating poll...' }}</p>
  </div>

  <form [formGroup]="pollForm" (ngSubmit)="onSubmit()" *ngIf="!loading">
    <div class="alert alert-danger" *ngIf="error">
      {{ error }}
    </div>

    <!-- Title -->
    <div class="form-group">
      <label>Poll Title</label>
      <input
        type="text"
        formControlName="title"
        placeholder="Enter poll title"
        class="form-control"
        [class.error]="submitted && pollForm.get('title')?.errors"
      />
      <small class="error-message" *ngIf="submitted && pollForm.get('title')?.errors">
        Title required (min 5 characters)
      </small>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label>Description</label>
      <textarea
        formControlName="description"
        placeholder="Enter poll description"
        class="form-control"
        rows="4"
        [class.error]="submitted && pollForm.get('description')?.errors"
      ></textarea>
      <small class="error-message" *ngIf="submitted && pollForm.get('description')?.errors">
        Description required (min 10 characters)
      </small>
    </div>

    <!-- Options -->
    <div class="form-group">
      <label>Poll Options (2-4)</label>
      <div formArrayName="options" class="options-list">
        <div *ngFor="let option of optionsArray.controls; let i = index; let last = last" 
             [formGroupName]="i" 
             class="option-input-group">
          <input
            type="text"
            formControlName="optionText"
            placeholder="Enter option text"
            class="form-control"
            [class.error]="submitted && option.get('optionText')?.errors"
          />
          <button
            type="button"
            class="btn btn-sm btn-danger"
            (click)="removeOption(i)"
            [disabled]="optionsArray.length === 2"
            title="Remove option"
          >
            Remove
          </button>
        </div>
      </div>

      <small class="error-message" *ngIf="submitted && optionsArray.errors">
        You must have between 2 and 4 options
      </small>

      <button
        type="button"
        class="btn btn-secondary btn-sm"
        (click)="addOption()"
        [disabled]="optionsArray.length === 4"
      >
        + Add Another Option
      </button>
    </div>

    <!-- Submit -->
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ isEditMode ? 'Update Poll' : 'Create Poll' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="goBack()">
        Cancel
      </button>
    </div>
  </form>
</div>
