<div class="form-container">
  <h2>{{ isEditMode ? 'Edit' : 'Create' }} Poll</h2>
  <form [formGroup]="pollForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Title</label>
      <inputtype="text" formControlName="title" class="form-control">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textareaformControlName="description" class="form-control"></textareaformControlName=>
    </div>
    <button type="submit" class="btn btn-primary">{{ isEditMode ? 'Update' : 'Create' }}</button>
    <button type="button" (click)="goBack()" class="btn btn-secondary">Cancel</button>
  </form>
</div>
