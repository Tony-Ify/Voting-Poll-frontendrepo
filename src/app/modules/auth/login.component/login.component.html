<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🗳️ Poll & Voting System</h1>
      <p>Civic Engagement Platform</p>
    </div>

    <h2>Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="your@email.com"
          class="form-control"
          [class.error]="submitted && f['email'].errors"
        />
        <small class="error-message" *ngIf="submitted && f['email'].errors">
          {{ f['email'].errors['required'] ? 'Email required' : 'Invalid email' }}
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Your password"
          class="form-control"
          [class.error]="submitted && f['password'].errors"
        />
        <small class="error-message" *ngIf="submitted && f['password'].errors">
          {{ f['password'].errors['required'] ? 'Password required' : 'Minimum 6 characters' }}
        </small>
      </div>

      <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>No account? <a routerLink="/signup">Sign up</a></p>
    </div>
  </div>
</div>
