<div class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="your@email.com" class="form-control">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Your password" class="form-control">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <p>No account found? <a routerLink="/signup">Sign up</a></p>
  </div>
</div>
