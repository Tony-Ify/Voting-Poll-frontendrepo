<div class="auth-container">
  <div class="auth-card">
    <h2>Sign Up</h2>
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Name</label>
        <input type="text" formControlName="name" placeholder="John Doe" class="form-control">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="your@email.com" class="form-control">
      </div>
      <div class="form-group">
        <label>State</label>
        <selectformControlName="state" class="form-control">
          <option value="">Select state</option>
          <option *ngFor="let state of states" [value]="state">{{ state }}</option>
        </selectformControlName=>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Min 6 characters" class="form-control">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
    </form>
    <p>Have account? <a routerLink="/login">Login</a></p>
  </div>
</div>
