<div class="profile-container">
  <div class="profile-header">
    <h2>User Profile</h2>
    <button class="btn btn-secondary" (click)="toggleEditMode()" *ngIf="!editMode">
      Edit Profile
    </button>
  </div>

  <!-- Success Message -->
  <div class="alert alert-success" *ngIf="success">
    {{ success }}
  </div>

  <!-- Error Message -->
  <div class="alert alert-danger" *ngIf="error">
    {{ error }}
  </div>

  <!-- Profile View Mode -->
  <div class="profile-card" *ngIf="user && !editMode">
    <div class="profile-info">
      <div class="profile-field">
        <label>Name</label>
        <p>{{ user.name }}</p>
      </div>

      <div class="profile-field">
        <label>Email</label>
        <p>{{ user.email }}</p>
      </div>

      <div class="profile-field">
        <label>State</label>
        <p>{{ user.state }}</p>
      </div>

      <div class="profile-field">
        <label>Role</label>
        <span class="badge" [class.admin]="user.role === 'admin'">
          {{ user.role | uppercase }}
        </span>
      </div>
    </div>

    <div class="profile-actions">
      <button class="btn btn-secondary" (click)="toggleEditMode()">
        Edit Profile
      </button>
      <button class="btn btn-danger" (click)="logout()">
        Logout
      </button>
    </div>
  </div>

  <!-- Profile Edit Mode -->
  <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" *ngIf="editMode">
    <div class="form-group">
      <label>Name</label>
      <input
        type="text"
        formControlName="name"
        placeholder="Your name"
        class="form-control"
        [class.error]="submitted && f['name'].errors"
      />
      <small class="error-message" *ngIf="submitted && f['name'].errors">
        Name required (min 2 characters)
      </small>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        formControlName="email"
        placeholder="Your email"
        class="form-control"
        disabled
      />
      <small>Email cannot be changed</small>
    </div>

    <div class="form-group">
      <label>State</label>
      <selectformControlName="state" class="form-control" [class.error]="submitted && f['state'].errors">
        <option value="">Select your state</option>
        <option *ngFor="let state of states" [value]="state">{{ state }}</option>
      </selectformControlName=>
      <small class="error-message" *ngIf="submitted && f['state'].errors">
        State is required
      </small>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Saving...' : 'Save Changes' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="toggleEditMode()" [disabled]="loading">
        Cancel
      </button>
    </div>
  </form>
</div>
