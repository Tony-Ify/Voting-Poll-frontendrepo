<div class="results-container">
  <h2>{{ poll?.title }} - Results</h2>
  <div class="results">
    <div *ngFor="let stat of results?.stats" class="result-item">
      <span>{{ stat.optionText }}: {{ stat.percentage }}% ({{ stat.voteCount }} votes)</span>
      <div class="bar" [style.width.%]="stat.percentage"></div>
    </div>
  </div>
</div>
