<div class="poll-detail">
  <button (click)="goBack()" class="btn btn-secondary">← Back</button>
  <h2>{{ poll?.title }}</h2>
  <p>{{ poll?.description }}</p>
  <div class="options">
    <label *ngFor="let option of poll?.options">
      <input type="radio" [value]="option.id" [(ngModel)]="selectedOptionId">
      {{ option.optionText }}
    </label>
  </div>
  <button (click)="submitVote()" class="btn btn-primary">Submit Vote</button>
</div>
