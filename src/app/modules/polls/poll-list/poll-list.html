<div class="polls-container">
  <h2>Polls</h2>
  <div class="polls-grid">
    <div *ngFor="let poll of polls" class="poll-card">
      <h3>{{ poll.title }}</h3>
      <p>{{ poll.description }}</p>
      <button (click)="votePoll(poll.id)" class="btn btn-primary">Vote</button>
      <button (click)="viewResults(poll.id)" class="btn btn-secondary">Results</button>
    </div>
  </div>
</div>
