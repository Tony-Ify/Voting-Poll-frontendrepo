<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">
      <h1> Poll & Voting System</h1>
    </div>

    <div class="navbar-menu" *ngIf="isAuthenticated$ | async as isAuth">
      <div class="navbar-links" *ngIf="isAuth">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Dashboard
        </a>
        <a routerLink="/profile" routerLinkActive="active">
          Profile
        </a>
        <a routerLink="/admin" routerLinkActive="active">
          Admin
        </a>
      </div>

      <div class="navbar-controls">
        <button class="btn-theme" (click)="toggleTheme()" title="Toggle theme">
          <span *ngIf="(currentTheme$ | async) === 'light'">🌙</span>
          <span *ngIf="(currentTheme$ | async) === 'dark'">☀️</span>
        </button>

        <div class="user-menu" *ngIf="currentUser$ | async as user">
          <span class="user-name">{{ user.name }}</span>
          <button class="btn btn-danger" (click)="logout()">Logout</button>
        </div>
      </div>
    </div>

    <div class="navbar-auth" *ngIf="!(isAuthenticated$ | async)">
      <button class="btn-theme" (click)="toggleTheme()" title="Toggle theme">
        <span *ngIf="(currentTheme$ | async) === 'light'">🌙</span>
        <span *ngIf="(currentTheme$ | async) === 'dark'">☀️</span>
      </button>
      <a routerLink="/login" class="btn btn-primary">Login</a>
      <a routerLink="/signup" class="btn btn-secondary">Sign Up</a>
    </div>
  </div>
</nav>

<main class="container">
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <p>&copy; 2024 Poll & Voting System. Built with ❤️ for Civic Engagement</p>
</footer>
